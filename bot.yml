name: Run Giveaway Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-telegram-bot==21.5

      - name: Run bot
        env:
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:     ${{ secrets.CHANNEL_ID }}
          ADMIN_ID:       ${{ secrets.ADMIN_ID }}
          GIVEAWAY_TITLE: ${{ secrets.GIVEAWAY_TITLE }}
          PRIZE_TEXT:     ${{ secrets.PRIZE_TEXT }}
        run: python bot.py
