name: Run Giveaway Bot

on:
  workflow_dispatch:        # запуск вручную с кнопки в GitHub
  schedule:
    - cron: "0 */5 * * *"  # перезапуск каждые 5 часов (Actions лимит ~6ч)

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # ~5 ч 50 мин — чуть меньше лимита Actions

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Восстановить базу участников из артефакта (если есть)
      - name: Restore participants data
        uses: dawidd6/action-download-artifact@v6
        with:
          name: participants-db
          path: .
        continue-on-error: true   # первый запуск — файла ещё нет

      - name: Run bot
        env:
          BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:     ${{ secrets.CHANNEL_ID }}
          ADMIN_ID:       ${{ secrets.ADMIN_ID }}
          GIVEAWAY_TITLE: ${{ secrets.GIVEAWAY_TITLE }}
          PRIZE_TEXT:     ${{ secrets.PRIZE_TEXT }}
        run: python bot.py

      # Сохранить базу участников между запусками
      - name: Save participants data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: participants-db
          path: participants.json
          retention-days: 90
